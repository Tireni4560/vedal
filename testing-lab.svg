  <rect y="160" width="600" height="25" fill="#8A96A8"/>
  <!-- Equipment -->
  <!-- Machine 1 -->
  <rect x="60" y="80" width="110" height="80" rx="6" class="navy"/>
  <rect x="70" y="90" width="90" height="25" fill="#FF6B35" opacity="0.7"/>
