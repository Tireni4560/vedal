<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.lab{fill:#F0F4F8;}.navy{fill:#0F1F3D;}.accent{fill:#FF6B35;}.steel{fill:#5A6A7C;}.bg{fill:#F8F9FA;}</style></defs>
  <rect width="600" height="400" class="bg"/>
