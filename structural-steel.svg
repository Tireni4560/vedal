<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.dark{fill:#3A4A5C;}.steel{fill:#5A6A7C;}.light{fill:#E0E5EC;}.accent{fill:#FF6B35;}.bg{fill:#F8F9FA;}</style></defs>
  <rect width="600" height="400" class="bg"/>
  <!-- I-beam and structural profiles -->
  <g transform="translate(60,60)">
    <!-- I-beam 1 -->
    <rect x="20" y="20" width="160" height="18" class="dark"/>
    <rect x="20" y="110" width="160" height="18" class="dark"/>
    <rect x="85" y="20" width="30" height="108" class="steel"/>
    <!-- Second beam -->
    <rect x="220" y="50" width="140" height="16" class="steel"/>
    <rect x="220" y="130" width="140" height="16" class="steel"/>
    <rect x="275" y="50" width="30" height="96" class="dark"/>
  </g>
  <!-- Angles / channels -->
  <g transform="translate(420,80)">
    <!-- C channel -->
    <rect x="0" y="0" width="18" height="160" class="dark"/>
    <rect x="0" y="0" width="70" height="18" class="steel"/>
    <rect x="0" y="142" width="70" height="18" class="steel"/>
  </g>
  <ellipse cx="300" cy="340" rx="200" ry="30" fill="#00000010"/>
</svg>