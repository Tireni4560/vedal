<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.concrete{fill:#C8CDD4;}.navy{fill:#0F1F3D;}.accent{fill:#FF6B35;}.steel{fill:#5A6A7C;}.bg{fill:#F8F9FA;}</style></defs>
  <rect width="600" height="400" class="bg"/>
  <!-- High ceiling warehouse interior -->
  <rect y="90" width="600" height="310" class="concrete"/>
  <!-- Back wall -->
  <rect y="90" width="600" height="180" fill="#A8B0B8"/>
  <!-- Skylights / lights -->
  <rect x="80" y="100" width="100" height="18" fill="#FFE8D6" opacity="0.5"/>
  <rect x="250" y="100" width="100" height="18" fill="#FFE8D6" opacity="0.5"/>
  <rect x="420" y="100" width="100" height="18" fill="#FFE8D6" opacity="0.5"/>
  <!-- Shelving left -->
  <g transform="translate(40,150)">
    <rect width="110" height="230" fill="#7A8288"/>
    <line x1="0" y1="35" x2="110" y2="35" stroke="#A8B0B8" stroke-width="2"/>
    <line x1="0" y1="80" x2="110" y2="80" stroke="#A8B0B8" stroke-width="2"/>
    <line x1="0" y1="125" x2="110" y2="125" stroke="#A8B0B8" stroke-width="2"/>
    <line x1="0" y1="170" x2="110" y2="170" stroke="#A8B0B8" stroke-width="2"/>
  </g>
  <!-- Shelving right -->
  <g transform="translate(450,150)">
    <rect width="110" height="230" fill="#7A8288"/>
    <line x1="0" y1="35" x2="110" y2="35" stroke="#A8B0B8" stroke-width="2"/>
    <line x1="0" y1="80" x2="110" y2="80" stroke="#A8B0B8" stroke-width="2"/>
    <line x1="0" y1="125" x2="110" y2="125" stroke="#A8B0B8" stroke-width="2"/>
    <line x1="0" y1="170" x2="110" y2="170" stroke="#A8B0B8" stroke-width="2"/>
  </g>
  <!-- Aisle markers + accent lights -->
  <circle cx="180" cy="115" r="10" class="accent" opacity="0.7"/>
  <circle cx="300" cy="115" r="10" class="accent" opacity="0.7"/>
  <circle cx="420" cy="115" r="10" class="accent" opacity="0.7"/>
  <!-- Floor lines -->
  <line x1="160" y1="280" x2="440" y2="280" stroke="#666" stroke-width="2" stroke-dasharray="12,8"/>
</svg>