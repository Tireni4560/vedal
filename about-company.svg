<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.navy{fill:#0F1F3D;}.accent{fill:#FF6B35;}.steel{fill:#5A6A7C;}.light{fill:#E8ECF2;}.bg{fill:#F8F9FA;}</style></defs>
  <rect width="600" height="400" class="bg"/>
  <!-- Modern office / HQ building -->
  <rect x="120" y="90" width="360" height="220" fill="#B8C4D0"/>
  <!-- Windows grid -->
  <g fill="#E8F4F8" opacity="0.85">
    <rect x="145" y="115" width="50" height="35" rx="2"/>
    <rect x="210" y="115" width="50" height="35" rx="2"/>
    <rect x="275" y="115" width="50" height="35" rx="2"/>
    <rect x="340" y="115" width="50" height="35" rx="2"/>
    <rect x="145" y="165" width="50" height="35" rx="2"/>
    <rect x="210" y="165" width="50" height="35" rx="2"/>
    <rect x="275" y="165" width="50" height="35" rx="2"/>
    <rect x="340" y="165" width="50" height="35" rx="2"/>
    <rect x="145" y="215" width="50" height="35" rx="2"/>
    <rect x="210" y="215" width="50" height="35" rx="2"/>
    <rect x="275" y="215" width="50" height="35" rx="2"/>
    <rect x="340" y="215" width="50" height="35" rx="2"/>
  </g>
  <!-- Entrance accent -->
  <rect x="250" y="260" width="100" height="50" fill="#0F1F3D"/>
  <rect x="265" y="265" width="70" height="40" fill="#FF6B35" opacity="0.3"/>
  <!-- Flag / accent -->
  <rect x="460" y="80" width="8" height="120" class="navy"/>
  <rect x="468" y="85" width="55" height="35" class="accent"/>
</svg>