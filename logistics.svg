<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.navy{fill:#0F1F3D;}.accent{fill:#FF6B35;}.steel{fill:#5A6A7C;}.bg{fill:#F8F9FA;}</style></defs>
  <rect width="600" height="400" class="bg"/>
  <!-- Yard + trucks -->
  <!-- Truck 1 -->
  <g transform="translate(40,160)">
    <rect x="0" y="20" width="160" height="70" rx="6" class="navy"/>
    <rect x="140" y="35" width="55" height="55" rx="4" fill="#3A4A5C"/>
    <!-- Cab -->
    <rect x="165" y="45" width="40" height="45" rx="4" class="steel"/>
    <!-- Wheels -->
    <circle cx="50" cy="95" r="16" fill="#2A3A4C"/>
    <circle cx="160" cy="95" r="16" fill="#2A3A4C"/>
    <!-- Accent stripe -->
    <rect x="10" y="40" width="130" height="8" class="accent"/>
  </g>
  <!-- Truck 2 -->
  <g transform="translate(300,180)">
    <rect x="0" y="10" width="170" height="65" rx="5" class="steel"/>
    <rect x="150" y="22" width="50" height="53" rx="3" class="navy"/>
    <circle cx="45" cy="82" r="14" fill="#2A3A4C"/>
    <circle cx="155" cy="82" r="14" fill="#2A3A4C"/>
    <rect x="20" y="30" width="100" height="7" class="accent"/>
  </g>
  <!-- Pallets / containers hint -->
  <rect x="80" y="280" width="80" height="55" rx="3" fill="#5A6A7C"/>
  <rect x="180" y="275" width="80" height="60" rx="3" fill="#3A4A5C"/>
  <rect x="420" y="270" width="95" height="65" rx="4" fill="#FF6B35" opacity="0.75"/>
</svg>