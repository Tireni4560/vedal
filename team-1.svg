<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.skin{fill:#D4A574;}.hair{fill:#2C2C2C;}.shirt{fill:#0F1F3D;}.bg{fill:#E8ECEF;}</style></defs>
  <circle cx="100" cy="100" r="98" class="bg"/>
  <!-- Head -->
  <circle cx="100" cy="92" r="48" class="skin"/>
  <!-- Hair -->
  <path d="M55 70 Q100 35 145 70 Q145 55 100 48 Q55 55 55 70" class="hair"/>
  <!-- Eyebrows -->
  <rect x="72" y="82" width="18" height="3" rx="1" fill="#1A1A1A"/>
  <rect x="110" y="82" width="18" height="3" rx="1" fill="#1A1A1A"/>
  <!-- Eyes -->
  <circle cx="80" cy="95" r="5" fill="#1A1A1A"/>
  <circle cx="120" cy="95" r="5" fill="#1A1A1A"/>
  <!-- Smile -->
  <path d="M80 108 Q100 118 120 108" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <!-- Shoulders / shirt -->
  <rect x="45" y="130" width="110" height="70" rx="8" class="shirt"/>
  <!-- Collar accent -->
  <rect x="82" y="130" width="36" height="18" fill="#FF6B35" opacity="0.6"/>
</svg>