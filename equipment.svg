<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.navy{fill:#0F1F3D;}.accent{fill:#FF6B35;}.steel{fill:#5A6A7C;}.bg{fill:#F8F9FA;}</style></defs>
  <rect width="600" height="400" class="bg"/>
  <!-- Industrial machinery -->
  <g transform="translate(70,60)">
    <!-- Base -->
    <rect x="0" y="180" width="420" height="90" rx="8" class="steel"/>
    <!-- Main body -->
    <rect x="40" y="70" width="340" height="120" rx="6" class="navy"/>
    <!-- Control panel -->
    <rect x="280" y="90" width="85" height="70" rx="4" fill="#3A4A5C"/>
    <circle cx="305" cy="115" r="8" class="accent"/>
    <circle cx="340" cy="115" r="8" fill="#27AE60"/>
    <!-- Gears / mechanism -->
    <circle cx="140" cy="130" r="32" fill="#4A5A6C"/>
    <circle cx="140" cy="130" r="18" fill="#FF6B35"/>
    <circle cx="220" cy="145" r="24" fill="#5A6A7C"/>
    <circle cx="220" cy="145" r="12" fill="#0F1F3D"/>
    <!-- Pipes -->
    <rect x="60" y="40" width="18" height="50" rx="3" class="steel"/>
  </g>
</svg>